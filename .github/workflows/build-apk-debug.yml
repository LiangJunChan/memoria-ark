name: Build APK Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Debug Capacitor Setup
      working-directory: frontend
      run: |
        echo "=== Debugging Capacitor Setup ==="
        echo "Directory structure:"
        ls -la
        echo ""
        echo "capacitor.config.json:"
        cat capacitor.config.json 2>/dev/null || echo "NOT FOUND"
        echo ""
        echo "package.json scripts:"
        cat package.json | grep -A5 '"scripts"'
        echo ""
        echo "Checking for android directory:"
        ls -la android 2>/dev/null || echo "android directory NOT FOUND"
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Build web
      working-directory: frontend
      run: npm run build
    
    - name: Add Capacitor Android (if not exists)
      working-directory: frontend
      run: |
        if [ ! -d "android" ]; then
          echo "Android directory not found, adding Capacitor Android platform..."
          npx cap add android
        else
          echo "Android directory already exists"
        fi
    
    - name: Sync Capacitor
      working-directory: frontend
      run: npx cap sync android --verbose