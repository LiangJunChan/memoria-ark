name: Build APK - Final

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install SDK components
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
    
    - name: Install dependencies
      working-directory: frontend
      run: |
        echo "Installing dependencies..."
        npm ci
        echo "Dependencies installed!"
    
    - name: Build web app
      working-directory: frontend
      run: |
        echo "Building web app..."
        npm run build
        echo "Build completed!"
        ls -la dist/
    
    - name: Check Capacitor setup
      working-directory: frontend
      run: |
        echo "Checking Capacitor setup..."
        if [ ! -f "capacitor.config.json" ]; then
          echo "ERROR: capacitor.config.json not found!"
          exit 1
        fi
        echo "capacitor.config.json OK"
        
        if [ ! -d "android" ]; then
          echo "Android directory not found, will add platform..."
        else
          echo "Android directory exists"
          ls -la android/
        fi
    
    - name: Initialize Capacitor Android
      working-directory: frontend
      run: |
        echo "Setting up Capacitor Android..."
        
        # Check if android directory exists
        if [ ! -d "android" ]; then
          echo "Adding Android platform..."
          npx cap add android
        fi
        
        # Copy web assets
        echo "Copying web assets..."
        npx cap copy android
        
        # Update native plugins
        echo "Updating native plugins..."
        npx cap update android
        
        echo "Capacitor Android setup completed!"
    
    - name: Build APK
      working-directory: frontend/android
      run: |
        echo "Building APK..."
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
        echo "APK build completed!"
        ls -la app/build/outputs/apk/debug/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: memoria-ark-apk
        path: frontend/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Upload error logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-error-logs
        path: |
          frontend/android/app/build/outputs/logs/
          frontend/npm-debug.log
        retention-days: 7
