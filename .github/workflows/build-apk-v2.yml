name: Build Android APK v2

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Initialize Capacitor (if needed)
        working-directory: frontend
        run: |
          # Check if android directory exists
          if [ ! -d "android" ]; then
            echo "Android platform not found, adding..."
            npx cap add android || echo "Android platform may already exist"
          fi

      - name: Sync Capacitor
        working-directory: frontend
        run: |
          npx cap sync android

      - name: Build Android APK (Debug)
        working-directory: frontend/android
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Android APK (Release)
        working-directory: frontend/android
        run: |
          ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn